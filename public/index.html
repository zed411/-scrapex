<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrapeX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">S</div>
        <h1>ScrapeX</h1>
      </div>
      <p class="subtitle">Automate Your Web Data Collection With ScrapeX</p>
    </header>

    <form id="searchForm" class="search-box">
      <input type="text" id="searchInput" placeholder='e.g. "Coffee shops", "Plumber Chicago", "Python tutorial"' required />
      <input type="text" id="locationInput" placeholder="Location (optional)" class="location-input" />
      <input type="text" id="keywordsInput" placeholder="Keywords (optional)" class="keywords-input" />
      <select id="maxResults" class="max-input">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="25">25</option>
        <option value="50">50</option>
      </select>
      <button type="submit" id="searchBtn">Scrape</button>
      <button type="button" id="stopBtn" class="stop-btn hidden">Stop</button>
    </form>

    <div id="toast" class="toast hidden"></div>

    <div id="statsBar" class="stats-bar hidden"></div>

    <div id="skeleton" class="skeleton hidden">
      <div class="skeleton-card"><div class="s-line w-60"></div><div class="s-line w-40"></div><div class="s-line w-80"></div></div>
      <div class="skeleton-card"><div class="s-line w-50"></div><div class="s-line w-70"></div><div class="s-line w-40"></div></div>
      <div class="skeleton-card"><div class="s-line w-70"></div><div class="s-line w-30"></div><div class="s-line w-60"></div></div>
    </div>

    <div id="results" class="results hidden">
      <div class="results-header">
        <h2>Results <span id="resultCount"></span></h2>
        <div class="results-actions">
          <button id="viewToggle" class="btn-icon" title="Toggle view">▦</button>
          <button id="exportCsvBtn" class="btn-secondary">CSV</button>
        </div>
      </div>
      <div class="table-wrap" id="tableView">
        <table id="resultsTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="cardsView" class="cards-view hidden"></div>
    </div>

    <div id="modal" class="modal hidden">
      <div class="modal-backdrop" id="modalClose"></div>
      <div class="modal-content">
        <button class="modal-x" id="modalCloseX">&times;</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <div class="footer">ScrapeX — free data extraction</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
